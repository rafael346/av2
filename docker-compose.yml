version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: clinica-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - clinica-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinica-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/clinica
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - clinica-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinica-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinica-net

volumes:
  mongo-data:

networks:
  clinica-net:
